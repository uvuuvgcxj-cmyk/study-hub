function toLatex(s){
  if(!s) return '';
  var t = s
    .replace(/x2(?!\d)/g,'x^{2}').replace(/y2(?!\d)/g,'y^{2}').replace(/z2(?!\d)/g,'z^{2}')
    .replace(/r2(?!\d)/g,'r^{2}').replace(/R2(?!\d)/g,'R^{2}').replace(/n2(?!\d)/g,'n^{2}')
    .replace(/a2(?!\d)/g,'a^{2}').replace(/b2(?!\d)/g,'b^{2}').replace(/c2(?!\d)/g,'c^{2}')
    .replace(/x3(?!\d)/g,'x^{3}').replace(/y3(?!\d)/g,'y^{3}').replace(/z3(?!\d)/g,'z^{3}')
    .replace(/x4(?!\d)/g,'x^{4}').replace(/y4(?!\d)/g,'y^{4}').replace(/z4(?!\d)/g,'z^{4}')
    .replace(/x5(?!\d)/g,'x^{5}').replace(/R3(?!\d)/g,'R^{3}').replace(/R4(?!\d)/g,'R^{4}')
    .replace(/xⁿ/g,'x^{n}').replace(/xⁿ⁺¹/g,'x^{n+1}').replace(/xⁿ⁻¹/g,'x^{n-1}')
    .replace(/∫/g,'\\int ').replace(/∬/g,'\\iint ').replace(/∭/g,'\\iiint ').replace(/∮/g,'\\oint ')
    .replace(/∑/g,'\\sum ').replace(/∂/g,'\\partial ').replace(/π/g,'\\pi ')
    .replace(/√/g,'\\sqrt ').replace(/∞/g,'\\infty ').replace(/→/g,'\\to ').replace(/⇒/g,'\\Rightarrow ')
    .replace(/≤/g,'\\le ').replace(/≥/g,'\\ge ').replace(/·/g,'\\cdot ')
    .replace(/½/g,'\\frac{1}{2}').replace(/⅓/g,'\\frac{1}{3}').replace(/¼/g,'\\frac{1}{4}')
    .replace(/⅛/g,'\\frac{1}{8}').replace(/⅙/g,'\\frac{1}{6}')
    // Handle e^(x) → e^{x}
    .replace(/e\(([^)]+)\)/g,'e^{$1}')
    // Handle common integal limits: ∫01 → \int_0^1
    .replace(/\\int (\d)(\d)/g,'\\int_$1^$2')
    .replace(/\\int_(\d)\^(\d)/g,'\\int_{$1}^{$2}')
    // Handle lim(x→0) → \lim_{x\to 0}
    .replace(/lim\(([^)]+)\)/g,'\\lim_{$1}')
    // Handle ln(, cos(, sin(, tan(
    .replace(/ln/g,'\\ln ').replace(/cos/g,'\\cos ').replace(/sin/g,'\\sin ').replace(/tan/g,'\\tan ');
  return t;
}

function renderMath(s){
  if(!s) return '';
  try{
    if(typeof katex !== 'undefined'){
      var t = toLatex(s);
      return katex.renderToString(t, {displayMode:false,throwOnError:false,output:'html'});
    }
  }catch(e){}
  return s;
}
