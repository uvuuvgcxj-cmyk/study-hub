<script>
[["选择","3分","解析几何","a","与曲面 x2/4+y2/9-z2/16=1 的交线为椭圆的是平面( )",["A.x=0","B.y=0","C.z=0","D.z=4"],"C","z=0截得x2/4+y2/9=1(椭圆)。x=0或y=0截得双曲线。","用z=常数截单叶双曲面→椭圆"],["选择","3分","全微分","g","z=xy在(1,2)处的全微分为( )",["A.2dx+dy","B.4dx+dy","C.4dx+2dy","D.dx+4dy"],"B","∂z/∂x=2xy=4,∂z/∂y=x=1,dz=4dx+dy","全微分必须有dx和dy两项"],["选择","3分","隐函数偏导","g","x2+y2+z2=xyz确定z=f(x,y),∂z/∂x=( )",["A.(yz-2x)/(2z-xy)","B.(2x-yz)/(xy-2z)","C.(yz-2x)/(xy-2z)","D.(2x-yz)/(2z-xy)"],"A","F=x2+y2+z2-xyz,F_x=2x-yz,F_z=2z-xy,∂z/∂x=-F_x/F_z=(yz-2x)/(2z-xy)","隐函数偏导= -F_x/F_z,负号!"],["选择","3分","三重积分","a","Ω: x2+y2+z2≤4, ∭(x2+y2+z2)dV=( )",["A.16π/5","B.32π/5","C.64π/5","D.128π/5"],"D","球坐标:∫dθ∫sinφdφ∫r4dr=2π×2×32/5=128π/5","球域遇x2+y2+z2→球坐标r4积分"],["选择","3分","级数判敛","r","以下级数收敛的是( )",["A.∑1/√n","B.∑n!/2n","C.∑ln(1+1/n2)","D.∑n/(n+1)"],"C","A:p=1/3发散;B:比值发散;C:ln(1+1/n2)~1/n2收敛;D:通项→1≠0发散","ln(1+□)~□→p级数"],["选择","3分","曲面积分","r","Σ:球面x2+y2+z2=R2, ∬(x2+y2)dS=( )",["A.0","B.4πR4/3","C.8πR4/3","D.4πR2"],"C","对称性:三个方向平方积分相等。=(2/3)R2×4πR2=8πR4/3","球面对称→三个平方积分相等"],["选择","3分","极限","a","lim(x→0)(ex-1-x)/x2 =( )",["A.0","B.1/2","C.1","D.2"],"B","ex=1+x+x2/2+O(x3)→(x2/2)/x2→1/2","ex-1-x→泰勒到二次项"],["选择","3分","曲线积分","a","L:y=x2从(0,0)→(1,1), ∫(x2+y)dx+(x-y2)dy=( )",["A.0","B.1/2","C.1","D.3/2"],"C","∂P/∂y=1=∂Q/∂x→与路径无关。原函数代入=1","先检查全微分条件→找原函数"],["填空","4分","解析几何","a","直线(x-1)/2=(y+2)/3=(z-3)/(-1)与(x-2)/1=(y-1)/m=(z-4)/(-2)垂直,m=","","-4/3","s1·s2=2+3m+2=0→m=-4/3","直线垂直→方向向量点积=0"],["填空","4分","微分方程","g","y-4y+4y=0的通解为","","y=(C1+C2x)e(2x)","r2-4r+4=0→(r-2)2=0→r=2重根→y=(C1+C2x)e(2x)","重根→第二个解乘x"],["填空","4分","傅里叶","r","f(x)=x(0<x<1),正弦级数s(x),s(-1/3)=","","-1/3","奇延拓→s(-1/3)=-s(1/3)=-f(1/3)=-1/3","奇延拓求值=s(-a)=-f(a)"],["填空","4分","旋转曲面","a","曲线z=x2绕z轴旋转一周所得曲面方程为","","z=x2+y2","绕z轴旋转→到z轴距离不变→x2+y2替换x2","绕z轴转→x2+y2替换原x2"],["填空","4分","极坐标","a","化∫01dy∫0y f(x2+y2)dx为极坐标形式","","∫0π/4 dθ∫0cscθ f(r2)·r dr","区域y=x下三角形。θ:0→π/4,r:0→cscθ","极坐标→画区域→先定θ→再定r"],["计算","8分","复合偏导","g","z=f(x2-y2,xy),f具二阶连续偏导,求∂z/∂x,∂2z/∂x∂y","","∂z/∂x=2x·fu+y·fv;∂2z/∂x∂y=-4xy·fuu+2(x2-y2)·fuv+xy·fvv+fv","令u=x2-y2,v=xy。链式法则求偏导","画依赖树→每条路径乘→所有路径加"],["计算","8分","一阶线性ODE","g","y-2y=e(2x),y(0)=1,求特解","","y=(x+1)e(2x)","P=-2,Q=e(2x)。μ=e(-2x)。(μy)=1→μy=x+C→代初值得C=1","四步法:①P,Q ②μ ③(μy)=μQ ④积分+代值"],["计算","8分","幂级数","g","∑xn/(n+1)的收敛域及和函数","","收敛域[-1,1);S(x)=-ln(1-x)/x,S(0)=1","R=1。x=1发散,x=-1收敛。xS(x)→求导→积分→-ln(1-x)","分母有n→先求导后积分。验端点!"],["计算","8分","格林公式","g","∫(exsiny-y)dx+(excosy+x)dy,L:上半圆x2+y2=ax(y≥0)从A(a,0)到O(0,0)","","πa2/4","Q_x-P_y=2。补x轴OA积分为0。格林→∬2dxdy=πa2/4","不封闭→补线→格林→减补线"],["计算","8分","曲面积分","r","∬x dydz+y dzdx+z dxdy, Σ:x+y+z=1在第一卦限上侧","","1/2","投影到xOy,z=1-x-y。公式化简得∬1dxdy=三角形面积0.5","一代二投三定向"],["计算","8分","应用","g","容积32m3长方体无盖水箱,长宽高多少时用料最省?","","长=宽=4m,高=2m","V=xyz=32,S=xy+2xz+2yz。拉格朗日→x=y=2z→代入得z=2","无盖→不加顶。找比例关系"]]
;
var chs=[{n:"综合",i:"📝",id:"all",fl:"全部",t:Q.length},{n:"解析几何",i:"📐",id:"g",fl:"解析几何"},{n:"微分方程",i:"🧮",id:"o",fl:"微分方程;一阶线性ODE"},{n:"多元微分",i:"📊",id:"m",fl:"全微分;隐函数偏导;复合偏导"},{n:"重积分",i:"🔲",id:"k",fl:"三重积分;极坐标"},{n:"曲线曲面积分",i:"🌀",id:"c",fl:"格林公式;曲线积分;曲面积分"},{n:"级数",i:"∞",id:"s",fl:"级数判敛;幂级数;傅里叶"},{n:"极限其他",i:"⚡",id:"x",fl:"极限;全微分;旋转曲面"}];
chs.forEach(function(c,i){if(c.fl&&c.fl!="全部"){var fs=c.fl.split(";");c.f=fs;var cnt=0;Q.forEach(function(q){if(fs.indexOf(q[2])>=0)cnt++});c.t=cnt}else if(c.id=="all"){c.t=Q.length}});
var cf=null;var cfn=0;
function rs(){var h="";chs.forEach(function(c){h+='<div class="it'+(c.id=="all"?" act":"")+'" onclick="se(\''+c.id+'\')">'+c.i+" "+c.n+(c.t?' <span class="tg">'+c.t+"</span>":"")+"</div>"});document.getElementById("tr").innerHTML=h}
function se(id){document.querySelectorAll(".it").forEach(function(e,i){var c=chs[i];if(c)e.classList.toggle("act",c.id==id)});var c=chs.find(function(x){return x.id==id});if(!c)return;document.getElementById("pt").textContent=c.i+" "+c.n;cfn=id;if(id=="all"){cf=null}else{cf=function(q){return c.f.indexOf(q[2])>=0}};rq()}
function rq(){var d=cf?Q.filter(cf):Q;var h="";for(var i=0;i<d.length;i++){var u=cf?Q.indexOf(d[i]):i;var q=Q[u];var op="";if(q[5]&&q[5].length>0&&q[5][0]!==""){for(var j=0;j<q[5].length;j++){var l=String.fromCharCode(65+j);op+='<div class="op" onclick="so('+u+',\''+l+'\')"><input type="radio" name="r'+u+'" value="'+l+'" style="display:none"> <b>'+l+'.</b> '+rM(q[5][j])+'</div>'}}var an=rM(q[6]||"");var sl=rM(q[7]||"");var tp=q[8]?rM(q[8]):"";h+='<div class="cd"><div class="qt"><strong>'+(i+1)+'.</strong> <span class="bg '+(q[3]=='g'?'g':q[3]=='r'?'r':'')+'">'+q[2]+'</span> <span class="s0">['+q[1]+']</span></div><div class="qt">'+rM(q[4])+'</div>'+op+'<button class="bt" onclick="ta('+u+')" id="b'+u+'" style="margin-top:4px">查看答案</button><div class="an" id="a'+u+'"><b>答案</b><br>'+an+"<br><br><b>解析</b><br>"+sl+(tp?"<br><br><span style='background:#e8eaf6;padding:2px 6px;border-radius:3px;font-size:12px;display:inline-block'>"+tp+"</span>":"")+'</div></div>'}document.getElementById("ql").innerHTML=h||"<div style='text-align:center;padding:40px;color:#888;font-size:14px'>暂无题目</div>";up()}
function sw(i){document.querySelectorAll(".tab").forEach(function(t,j){t.classList.toggle("act",j==i);document.getElementById("p"+j).classList.toggle("act",j==i)});if(i==0)rq();if(i==1)rk();if(i==2)ra()}
function ta(i){var b=document.getElementById("a"+i),t=document.getElementById("b"+i);if(!b||!t)return;if(b.style.display=="block"){b.style.display="none";t.textContent="查看答案";t.classList.remove("on")}else{b.style.display="block";t.textContent="收起答案";t.classList.add("on")}up()}
function so(i,v){var q=Q[i];if(!q)return;var r=document.getElementsByName("r"+i);for(var j=0;j<r.length;j++){var o=r[j].parentElement;o.classList.remove("ok","no");if(r[j].value==v){r[j].checked=true;o.classList.add(v==q[6]?"ok":"no")}}var b=document.getElementById("a"+i),t=document.getElementById("b"+i);if(b&&b.style.display!="block"){b.style.display="block";t.textContent="收起答案";t.classList.add("on")}up()}
function ex(){for(var i=0;i<Q.length;i++){var b=document.getElementById("a"+i),t=document.getElementById("b"+i);if(b)b.style.display="block";if(t){t.textContent="收起答案";t.classList.add("on")}}up()}
function co(){for(var i=0;i<Q.length;i++){var b=document.getElementById("a"+i);if(b)b.style.display="none";var t=document.getElementById("b"+i);if(t){t.textContent="查看答案";t.classList.remove("on")}}up()}

function ra(){var h="<div style='padding:16px'><h2 style='font-size:15px;margin-bottom:10px;color:#1a1a2e'>答案速查</h2>";for(var i=0;i<Q.length;i++){var q=Q[i];h+="<div style='padding:3px 0;border-bottom:1px solid #e0e0e0;font-size:12px;display:flex;gap:6px'><span style='color:#888;min-width:25px'>"+(i+1)+".</span><span style='flex:1;overflow:hidden;white-space:nowrap;color:#555'>"+q[4].substring(0,50)+"</span><span style='color:#1565c0;font-weight:600;min-width:50px;text-align:right'>"+(q[6]||"")+"</span></div>"}document.getElementById("as").innerHTML=h+"</div>"}
rs();rq();
