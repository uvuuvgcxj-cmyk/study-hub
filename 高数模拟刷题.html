<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>高数A1下·期末模拟刷题</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Microsoft YaHei',sans-serif;background:#f5f3f0;color:#2C2C2A;padding:16px;max-width:800px;margin:0 auto}
h2{font-size:19px;color:#4A3F8A;display:flex;align-items:center;gap:6px;margin-bottom:4px}
.sub{font-size:12px;color:#999;margin-bottom:12px}
.tabs{display:flex;gap:4px;margin-bottom:14px}
.tab{padding:8px 14px;border-radius:8px;border:1.5px solid #ddd;background:#fff;cursor:pointer;font-size:13px;transition:.15s;user-select:none}
.tab:hover{background:#EDE9FE;border-color:#8B7FD8}
.tab.act{background:#4A3F8A;color:#fff;border-color:#4A3F8A}
.panel{display:none}
.panel.act{display:block}
.card{background:#fff;border:1px solid #e8e5e0;border-radius:10px;padding:12px 14px;margin-bottom:8px;border-left:4px solid #4A3F8A}
.qtext{font-size:14px;line-height:1.7;margin-bottom:6px}
.badge{display:inline-block;font-size:10px;padding:1px 7px;border-radius:4px;background:#EDE9FE;color:#4A3F8A;margin-right:4px;font-weight:500}
.badge.g{background:#E2F0D9;color:#2D6A0A}
.badge.r{background:#FCE4E4;color:#B33030}
.badge.a{background:#FFF1D6;color:#9B6A0A}
.score{font-size:11px;color:#999;margin-left:3px}
.opt{padding:3px 0 3px 18px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;border-radius:4px;transition:.1s}
.opt:hover{background:#F5F3FF}
.opt .lbl{position:relative}
.opt.ok .lbl{color:#2D6A0A;font-weight:600}
.opt.ok .lbl::after{content:' ✓';color:#2D6A0A}
.opt.no .lbl{color:#B33030}
.opt.no .lbl::after{content:' ✗';color:#B33030}
.ansbox{display:none;margin-top:6px;padding:10px 12px;background:#F6F5FA;border-radius:8px;font-size:13px;line-height:1.8;border-left:3px solid #4A3F8A}
.ansbox b{color:#4A3F8A}
.btn{padding:3px 10px;border-radius:6px;border:1.5px solid #4A3F8A;background:transparent;color:#4A3F8A;cursor:pointer;font-size:11px;margin:2px;transition:.15s}
.btn:hover{background:#EDE9FE}
.btn.on{background:#4A3F8A;color:#fff}
.progress{display:flex;align-items:center;gap:8px;margin:10px 0;flex-wrap:wrap}
.bar{flex:1;height:6px;background:#ddd;border-radius:3px;overflow:hidden;min-width:60px}
.fill{height:100%;background:#4A3F8A;border-radius:3px;transition:width .3s}
.ptext{font-size:12px;color:#888}
.tip-bg{background:#EDE9FE;padding:3px 8px;border-radius:4px;font-size:12px;display:inline-block}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}
.sc-card{padding:12px;border-radius:8px;text-align:center}
.sc-card .num{font-size:20px;font-weight:700}
.sc-card .lab{font-size:10px;color:#888}
.sh{font-size:15px;font-weight:600;margin:12px 0 6px;padding:6px 10px;border-radius:6px;background:#EDE9FE;color:#3A2F7A}
.tip-card{border-left:3px solid #3B6D11;margin:6px 0;padding:8px 12px;background:#F6FFF6;border-radius:8px;font-size:13px;line-height:1.8}
</style>
</head>
<body>
<h2>📝 高数A1下 · 期末模拟刷题</h2>
<div class="sub">基于2023-2024海南大学真题 | 选择题可点选，自动判断正误</div>
<div class="tabs">
<div class="tab act" onclick="switchTab(0)">📋 刷题</div>
<div class="tab" onclick="switchTab(1)">📊 知识图谱</div>
<div class="tab" onclick="switchTab(2)">🏆 答案速查</div>
</div>

<div id="panel0" class="panel act">
<div class="progress">
<span class="ptext" id="pText">0/19</span>
<div class="bar"><div class="fill" id="pFill"></div></div>
<button class="btn" onclick="expandAll()">全部展开</button>
<button class="btn" onclick="collapseAll()">全部收起</button>
</div>
<div id="questionList"></div>
</div>

<div id="panel1" class="panel">
<div class="card" id="kgContent"></div>
</div>

<div id="panel2" class="panel">
<div class="card" id="answerSheet"></div>
</div>

<script>
var Q = [["选择","3分","解析几何","a","与曲面 x2/4+y2/9-z2/16=1 的交线为椭圆的是平面( )",["A.x=0","B.y=0","C.z=0","D.z=4"],"C","z=0截得x2/4+y2/9=1(椭圆)。x=0或y=0截得双曲线。","用z=常数截单叶双曲面→椭圆"],["选择","3分","全微分","g","z=xy在(1,2)处的全微分为( )",["A.2dx+dy","B.4dx+dy","C.4dx+2dy","D.dx+4dy"],"B","∂z/∂x=2xy=4,∂z/∂y=x=1,dz=4dx+dy","全微分必须有dx和dy两项"],["选择","3分","隐函数偏导","g","x2+y2+z2=xyz确定z=f(x,y),∂z/∂x=( )",["A.(yz-2x)/(2z-xy)","B.(2x-yz)/(xy-2z)","C.(yz-2x)/(xy-2z)","D.(2x-yz)/(2z-xy)"],"A","F=x2+y2+z2-xyz,F_x=2x-yz,F_z=2z-xy,∂z/∂x=-F_x/F_z=(yz-2x)/(2z-xy)","隐函数偏导= -F_x/F_z,负号!"],["选择","3分","三重积分","a","Ω: x2+y2+z2≤4, ∭(x2+y2+z2)dV=( )",["A.16π/5","B.32π/5","C.64π/5","D.128π/5"],"D","球坐标:∫dθ∫sinφdφ∫r4dr=2π×2×32/5=128π/5","球域遇x2+y2+z2→球坐标r4积分"],["选择","3分","级数判敛","r","以下级数收敛的是( )",["A.∑1/√n","B.∑n!/2n","C.∑ln(1+1/n2)","D.∑n/(n+1)"],"C","A:p=1/3发散;B:比值发散;C:ln(1+1/n2)~1/n2收敛;D:通项→1≠0发散","ln(1+□)~□→p级数"],["选择","3分","曲面积分","r","Σ:球面x2+y2+z2=R2, ∬(x2+y2)dS=( )",["A.0","B.4πR4/3","C.8πR4/3","D.4πR2"],"C","对称性:三个方向平方积分相等。=(2/3)R2×4πR2=8πR4/3","球面对称→三个平方积分相等"],["选择","3分","极限","a","lim(x→0)(ex-1-x)/x2 =( )",["A.0","B.1/2","C.1","D.2"],"B","ex=1+x+x2/2+O(x3)→(x2/2)/x2→1/2","ex-1-x→泰勒到二次项"],["选择","3分","曲线积分","a","L:y=x2从(0,0)→(1,1), ∫(x2+y)dx+(x-y2)dy=( )",["A.0","B.1/2","C.1","D.3/2"],"C","∂P/∂y=1=∂Q/∂x→与路径无关。原函数代入=1","先检查全微分条件→找原函数"],["填空","4分","解析几何","a","直线(x-1)/2=(y+2)/3=(z-3)/(-1)与(x-2)/1=(y-1)/m=(z-4)/(-2)垂直,m=","","-4/3","s1·s2=2+3m+2=0→m=-4/3","直线垂直→方向向量点积=0"],["填空","4分","微分方程","g","y-4y+4y=0的通解为","","y=(C1+C2x)e(2x)","r2-4r+4=0→(r-2)2=0→r=2重根→y=(C1+C2x)e(2x)","重根→第二个解乘x"],["填空","4分","傅里叶","r","f(x)=x(0<x<1),正弦级数s(x),s(-1/3)=","","-1/3","奇延拓→s(-1/3)=-s(1/3)=-f(1/3)=-1/3","奇延拓求值=s(-a)=-f(a)"],["填空","4分","旋转曲面","a","曲线z=x2绕z轴旋转一周所得曲面方程为","","z=x2+y2","绕z轴旋转→到z轴距离不变→x2+y2替换x2","绕z轴转→x2+y2替换原x2"],["填空","4分","极坐标","a","化∫01dy∫0y f(x2+y2)dx为极坐标形式","","∫0π/4 dθ∫0cscθ f(r2)·r dr","区域y=x下三角形。θ:0→π/4,r:0→cscθ","极坐标→画区域→先定θ→再定r"],["计算","8分","复合偏导","g","z=f(x2-y2,xy),f具二阶连续偏导,求∂z/∂x,∂2z/∂x∂y","","∂z/∂x=2x·fu+y·fv;∂2z/∂x∂y=-4xy·fuu+2(x2-y2)·fuv+xy·fvv+fv","令u=x2-y2,v=xy。链式法则求偏导","画依赖树→每条路径乘→所有路径加"],["计算","8分","一阶线性ODE","g","y-2y=e(2x),y(0)=1,求特解","","y=(x+1)e(2x)","P=-2,Q=e(2x)。μ=e(-2x)。(μy)=1→μy=x+C→代初值得C=1","四步法:①P,Q ②μ ③(μy)=μQ ④积分+代值"],["计算","8分","幂级数","g","∑xn/(n+1)的收敛域及和函数","","收敛域[-1,1);S(x)=-ln(1-x)/x,S(0)=1","R=1。x=1发散,x=-1收敛。xS(x)→求导→积分→-ln(1-x)","分母有n→先求导后积分。验端点!"],["计算","8分","格林公式","g","∫(exsiny-y)dx+(excosy+x)dy,L:上半圆x2+y2=ax(y≥0)从A(a,0)到O(0,0)","","πa2/4","Q_x-P_y=2。补x轴OA积分为0。格林→∬2dxdy=πa2/4","不封闭→补线→格林→减补线"],["计算","8分","曲面积分","r","∬x dydz+y dzdx+z dxdy, Σ:x+y+z=1在第一卦限上侧","","1/2","投影到xOy,z=1-x-y。公式化简得∬1dxdy=三角形面积0.5","一代二投三定向"],["计算","8分","应用","g","容积32m3长方体无盖水箱,长宽高多少时用料最省?","","长=宽=4m,高=2m","V=xyz=32,S=xy+2xz+2yz。拉格朗日→x=y=2z→代入得z=2","无盖→不加顶。找比例关系"]];

function render(){
  var list = document.getElementById('questionList');
  var html = '';
  for(var i=0;i<Q.length;i++){
    var q = Q[i];
    var opts = '';
    if(q[5] && q[5].length>0 && q[5][0]!==''){
      for(var j=0;j<q[5].length;j++){
        var letter = String.fromCharCode(65+j);
        opts += '<div class="opt" onclick="selectOpt('+i+',\''+letter+'\')">'+
          '<input type="radio" name="r'+i+'" value="'+letter+'" style="display:none">'+
          '<span class="lbl">'+letter+'. '+escHtml(q[5][j])+'</span></div>';
      }
    }
    var ans = escHtml(q[6]||'');
    var sol = escHtml(q[7]||'').replace(/\\n/g,'<br>');
    var tip = q[8] ? escHtml(q[8]) : '';
    html += '<div class="card">'+
      '<div class="qtext"><strong>'+q[0]+' '+(i+1)+'</strong> '+
      '<span class="badge '+q[3]+'">'+q[2]+'</span>'+
      '<span class="score">('+q[1]+')</span></div>'+
      '<div class="qtext">'+escHtml(q[4])+'</div>'+
      opts+
      '<button class="btn" onclick="toggleAns('+i+')" id="b'+i+'">查看答案</button>'+
      '<div class="ansbox" id="a'+i+'">'+
        '<b>✅ 答案：</b>'+ans+'<br><br>'+
        '<b>📖 解析：</b>'+sol+
        (tip ? '<br><br><span class="tip-bg">💡 '+tip+'</span>' : '')+
      '</div></div>';
  }
  list.innerHTML = html;
  updateProgress();
}

function escHtml(s){
  if(!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function switchTab(idx){
  var tabs = document.querySelectorAll('.tab');
  var panels = [document.getElementById('panel0'),document.getElementById('panel1'),document.getElementById('panel2')];
  for(var i=0;i<3;i++){
    tabs[i].classList.toggle('act',i===idx);
    panels[i].classList.toggle('act',i===idx);
  }
  if(idx===1) renderKnowledgeGraph();
  if(idx===2) renderAnswerSheet();
}

function toggleAns(i){
  var box = document.getElementById('a'+i);
  var btn = document.getElementById('b'+i);
  if(box.style.display==='block'){
    box.style.display='none';
    btn.textContent='查看答案';
    btn.classList.remove('on');
  } else {
    box.style.display='block';
    btn.textContent='收起答案';
    btn.classList.add('on');
  }
  updateProgress();
}

function selectOpt(i,val){
  var q = Q[i];
  if(!q) return;
  var radios = document.getElementsByName('r'+i);
  for(var j=0;j<radios.length;j++){
    var opt = radios[j].parentElement;
    opt.classList.remove('ok','no');
    if(radios[j].value===val){
      radios[j].checked=true;
      if(val===q[6]){
        opt.classList.add('ok');
      } else {
        opt.classList.add('no');
      }
    }
  }
  var box = document.getElementById('a'+i);
  var btn = document.getElementById('b'+i);
  if(box.style.display!=='block'){
    box.style.display='block';
    btn.textContent='收起答案';
    btn.classList.add('on');
  }
  updateProgress();
}

function expandAll(){
  for(var i=0;i<Q.length;i++){
    var box = document.getElementById('a'+i);
    var btn = document.getElementById('b'+i);
    if(box){box.style.display='block';}
    if(btn){btn.textContent='收起答案';btn.classList.add('on');}
  }
  updateProgress();
}

function collapseAll(){
  for(var i=0;i<Q.length;i++){
    var box = document.getElementById('a'+i);
    var btn = document.getElementById('b'+i);
    if(box){box.style.display='none';}
    if(btn){btn.textContent='查看答案';btn.classList.remove('on');}
  }
  updateProgress();
}

function updateProgress(){
  var n=0;
  for(var i=0;i<Q.length;i++){
    var box = document.getElementById('a'+i);
    if(box && box.style.display==='block') n++;
  }
  var pct = Math.round(n/Q.length*100);
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('pText').textContent=n+'/'+Q.length;
}

function renderKnowledgeGraph(){
  var html = 
    '<h2 style="margin-bottom:8px">各模块分值占比</h2>'+
    '<div class="grid">'+
    '<div class="sc-card" style="background:#EDE9FE"><div class="num" style="color:#4A3F8A">~29分</div><div class="lab">多元微分</div></div>'+
    '<div class="sc-card" style="background:#D6F0E6"><div class="num" style="color:#0F6E56">~22分</div><div class="lab">重积分+曲面</div></div>'+
    '<div class="sc-card" style="background:#FFF1D6"><div class="num" style="color:#9B6A0A">~16分</div><div class="lab">无穷级数</div></div>'+
    '<div class="sc-card" style="background:#FCE4E4"><div class="num" style="color:#B33030">~12分</div><div class="lab">微分方程</div></div>'+
    '<div class="sc-card" style="background:#F0F0F0"><div class="num" style="color:#555">~12分</div><div class="lab">解析几何</div></div>'+
    '<div class="sc-card" style="background:#F0F0F0"><div class="num" style="color:#555">~9分</div><div class="lab">其他</div></div>'+
    '</div>'+
    '<div class="sh">⭐⭐⭐⭐⭐ 必考题型（100%出）</div>'+
    '<div class="tip-card">• <b>一阶线性ODE</b>：y\'+Py=Q → μ=e<sup>∫Pdx</sup> → (μy)\'=μQ → 积分代值<br>• <b>幂级数和函数</b>：求R→验端点→分母有n先导后积→无分母先积后导<br>• <b>格林公式</b>：不封闭→补线→格林→减补线<br>• <b>拉格朗日乘数法</b>：条件极值，找比例关系</div>'+
    '<div class="sh">⭐⭐⭐⭐ 高频考点</div>'+
    '<div class="tip-card">• <b>隐函数偏导</b>：∂z/∂x = <span style="color:#B33030;font-weight:bold">-</span>F_x/F_z <span style="color:#B33030">(负号!!)</span><br>• <b>复合偏导</b>：画依赖树→每条路径乘→所有路径加<br>• <b>级数判敛</b>：比值/根值→p级数→比较极限→交错级数<br>• <b>傅里叶</b>：奇延拓s(-a)=-f(a)，偶延拓s(-a)=f(a)</div>'+
    '<div class="sh">💀 五大失分陷阱</div>'+
    '<div class="tip-card">1️⃣ 隐函数偏导<span style="color:#B33030">忘负号</span><br>2️⃣ 极坐标<span style="color:#B33030">忘乘r</span> dxdy = r drdθ<br>3️⃣ 收敛域<span style="color:#B33030">忘验端点</span><br>4️⃣ 格林公式<span style="color:#B33030">忘补线/忘减补线</span><br>5️⃣ 重根<span style="color:#B33030">忘乘x</span> y=(C<sub>1</sub>+C<sub>2</sub>x)e<sup>rx</sup></div>';
  document.getElementById('kgContent').innerHTML = html;
}

function renderAnswerSheet(){
  var html = '<h2 style="margin-bottom:8px">全题答案速查</h2>';
  for(var i=0;i<Q.length;i++){
    var q = Q[i];
    var ans = escHtml(q[6]||'');
    var diff = {'g':'易','r':'中','a':'难'}[q[3]]||'';
    html += '<div style="padding:6px 0;border-bottom:1px solid #eee;font-size:13px;display:flex;gap:6px;align-items:baseline">'+
      '<span style="color:#999;min-width:35px">'+(i+1)+'.</span>'+
      '<span style="min-width:45px;font-size:11px;color:#888">'+diff+'</span>'+
      '<span style="flex:1">'+escHtml(q[4].substring(0,40))+'…</span>'+
      '<span style="color:#4A3F8A;font-weight:600;min-width:60px;text-align:right">'+ans+'</span></div>';
  }
  document.getElementById('answerSheet').innerHTML = html;
}

render();
</script>
</body>
</html>
