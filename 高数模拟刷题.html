    .replace(/r2(?![0-9])/g,'r^{2}').replace(/R2(?![0-9])/g,'R^{2}').replace(/a2(?![0-9])/g,'a^{2}')
    .replace(/b2(?![0-9])/g,'b^{2}').replace(/c2(?![0-9])/g,'c^{2}').replace(/n2(?![0-9])/g,'n^{2}')
    .replace(/π/g,'\\pi ').replace(/∂/g,'\\partial ').replace(/∫/g,'\\int ').replace(/∑/g,'\\sum ')
    .replace(/∬/g,'\\iint ').replace(/∭/g,'\\iiint ').replace(/√/g,'\\sqrt ').replace(/→/g,'\\to ')
    .replace(/∞/g,'\\infty ').replace(/≤/g,'\\le ').replace(/≥/g,'\\ge ').replace(/·/g,'\\cdot ').replace(/∼/g,'\\sim ');
  try{ return katex.renderToString(t, {displayMode:false,throwOnError:false}); }
  catch(e){ return escHtml(s); }
}

function escHtml(s){
  if(!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render(){
  var list = document.getElementById('questionList');
  var html = '';
  for(var i=0;i<Q.length;i++){
    var q = Q[i];
    var opts = '';
    if(q[5] && q[5].length>0 && q[5][0]!==''){
      for(var j=0;j<q[5].length;j++){
        var letter = String.fromCharCode(65+j);
        opts += '<div class="opt" onclick="selectOpt('+i+',\''+letter+'\')">'+
          '<input type="radio" name="r'+i+'" value="'+letter+'" style="display:none">'+
          '<span class="lbl">'+letter+'. '+math(q[5][j])+'</span></div>';
      }
    }
    var ansHtml = math(q[6]||'');
    var solHtml = q[7]||'';
    solHtml = solHtml.replace(/([xyznrabcR])(\d+)/g,'$1^{$2}');
    solHtml = solHtml.replace(/π/g,'\\\\pi ').replace(/∂/g,'\\\\partial ').replace(/∫/g,'\\\\int ');
    try{ solHtml = katex.renderToString(solHtml, {displayMode:false,throwOnError:false}); }
    catch(e){ solHtml = escHtml(q[7]||'').replace(/\\n/g,'<br>'); }
    var tip = q[8] ? math(q[8]) : '';
    var ext = (window.Ext && Ext[i]) ? Ext[i] : null;
    html += '<div class="card">'+
      '<div class="qtext"><strong>'+q[0]+' '+(i+1)+'</strong> '+
      '<span class="badge '+q[3]+'">'+q[2]+'</span><span class="score">('+q[1]+')</span></div>'+
      '<div class="qtext">'+math(q[4])+'</div>'+opts+
      '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">'+
      '<button class="btn" onclick="toggleAns('+i+')" id="b'+i+'">查看答案</button>'+
      (ext ? '<button class="btn green" onclick="toggleDeep('+i+')" id="d'+i+'">📘 深度解析</button>' : '')+
      '</div>'+
      '<div class="ansbox" id="a'+i+'"><b>✅ 答案：</b>'+ansHtml+'<br><br><b>📖 解析：</b><br>'+solHtml+
      (tip ? '<br><br><span class="tip-bg">💡 '+tip+'</span>' : '')+'</div>'+
      (ext ? '<div class="deepbox" id="dbox'+i+'"><b>📘 深度讲解</b><br>'+ext.deep+'<br><br><div class="extend-box">'+ext.extend+'</div></div>' : '')+
      '</div>';
  }
  list.innerHTML = html;
  updateProgress();
}

function switchTab(idx){
  document.querySelectorAll('.tab').forEach(function(t,j){t.classList.toggle('act',j===idx);});
  ['panel0','panel1','panel2'].forEach(function(id,j){document.getElementById(id).classList.toggle('act',j===idx);});
  if(idx===1) renderKnowledgeGraph();
  if(idx===2) renderAnswerSheet();
}

function toggleAns(i){
  var box = document.getElementById('a'+i), btn = document.getElementById('b'+i);
  if(box.style.display==='block'){box.style.display='none';btn.textContent='查看答案';btn.classList.remove('on');}
  else{box.style.display='block';btn.textContent='收起答案';btn.classList.add('on');}
  updateProgress();
}

function toggleDeep(i){
  var box = document.getElementById('dbox'+i), btn = document.getElementById('d'+i);
  if(box.style.display==='block'){box.style.display='none';btn.textContent='📘 深度解析';btn.classList.remove('on');}
  else{box.style.display='block';btn.textContent='📘 收起解析';btn.classList.add('on');
    var abox = document.getElementById('a'+i), abtn = document.getElementById('b'+i);
    if(abox.style.display!=='block'){abox.style.display='block';abtn.textContent='收起答案';abtn.classList.add('on');}}
  updateProgress();
}

function selectOpt(i,val){
  var q = Q[i]; if(!q) return;
  var radios = document.getElementsByName('r'+i);
  for(var j=0;j<radios.length;j++){
    var opt = radios[j].parentElement; opt.classList.remove('ok','no');
    if(radios[j].value===val){radios[j].checked=true;
      if(val===q[6]) opt.classList.add('ok'); else opt.classList.add('no');}
  }
  var box = document.getElementById('a'+i), btn = document.getElementById('b'+i);
  if(box.style.display!=='block'){box.style.display='block';btn.textContent='收起答案';btn.classList.add('on');}
  updateProgress();
}

function expandAll(){for(var i=0;i<Q.length;i++){var b=document.getElementById('a'+i),t=document.getElementById('b'+i);if(b)b.style.display='block';if(t){t.textContent='收起答案';t.classList.add('on');}}updateProgress();}

function collapseAll(){for(var i=0;i<Q.length;i++){
  ['a','dbox'].forEach(function(k){var x=document.getElementById(k+i);if(x)x.style.display='none';});
  var t=document.getElementById('b'+i);if(t){t.textContent='查看答案';t.classList.remove('on');}
  var d=document.getElementById('d'+i);if(d){d.textContent='📘 深度解析';d.classList.remove('on');}
}updateProgress();}

function updateProgress(){var n=0;for(var i=0;i<Q.length;i++){var b=document.getElementById('a'+i);if(b&&b.style.display==='block')n++;}document.getElementById('pFill').style.width=Math.round(n/Q.length*100)+'%';document.getElementById('pText').textContent=n+'/'+Q.length;}

function renderKnowledgeGraph(){document.getElementById('kgContent').innerHTML=
'<h2 style="margin-bottom:8px">各模块分值占比</h2>'+
'<div class="grid"><div class="sc-card" style="background:#EDE9FE"><div class="num" style="color:#4A3F8A">~29分</div><div class="lab">多元微分</div></div>'+
'<div class="sc-card" style="background:#D6F0E6"><div class="num" style="color:#0F6E56">~22分</div><div class="lab">重积分</div></div>'+
'<div class="sc-card" style="background:#FFF1D6"><div class="num" style="color:#9B6A0A">~16分</div><div class="lab">无穷级数</div></div>'+
'<div class="sc-card" style="background:#FCE4E4"><div class="num" style="color:#B33030">~12分</div><div class="lab">微分方程</div></div>'+
'<div class="sc-card" style="background:#F0F0F0"><div class="num" style="color:#555">~12分</div><div class="lab">解析几何</div></div>'+
'<div class="sc-card" style="background:#F0F0F0"><div class="num" style="color:#555">~9分</div><div class="lab">其他</div></div></div>'+
'<div class="sh">⭐⭐⭐⭐⭐ 必考题型</div>'+
'<div class="tip-card">• 一阶线性ODE：y\\'+Py=Q → μ=e^{∫Pdx} → (μy)\\'=μQ<br>• 幂级数和函数：分母有n先导后积，验端点！<br>• 格林公式：不封闭→补线→格林→减补线<br>• 拉格朗日：条件极值，找比例关系</div>'+
'<div class="sh">💀 五大失分陷阱</div>'+
'<div class="tip-card">1️⃣ 隐函数偏导 <span style="color:#B33030">忘负号</span><br>2️⃣ 极坐标 <span style="color:#B33030">忘乘r</span><br>3️⃣ 收敛域 <span style="color:#B33030">忘验端点</span><br>4️⃣ 格林 <span style="color:#B33030">忘补线/减线</span><br>5️⃣ 重根 <span style="color:#B33030">忘乘x</span></div>';}

function renderAnswerSheet(){var h='<h2 style="margin-bottom:8px">全题答案速查</h2>';for(var i=0;i<Q.length;i++){var q=Q[i],a=math(q[6]||''),d={g:'易',r:'中',a:'难'}[q[3]]||'';h+='<div style="padding:5px 0;border-bottom:1px solid #eee;font-size:13px;display:flex;gap:6px;align-items:baseline"><span style="color:#999;min-width:35px">'+(i+1)+'.</span><span style="min-width:40px;font-size:11px;color:#888;text-align:center">'+d+'</span><span style="flex:1;font-size:12px;overflow:hidden;white-space:nowrap">'+escHtml(q[4].substring(0,40))+'</span><span style="color:#4A3F8A;font-weight:600;min-width:80px;text-align:right">'+a+'</span></div>';}document.getElementById('answerSheet').innerHTML=h;}

render();
</script>
